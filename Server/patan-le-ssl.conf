<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName patan.onlinejobportal.org
    DocumentRoot /home/dev-team-np/project/nagarpalika-v2/Server/out/web

    LimitRequestBody 20971520

    ErrorLog ${APACHE_LOG_DIR}/patan-error.log
    CustomLog ${APACHE_LOG_DIR}/patan-access.log combined

    <Directory /home/dev-team-np/project/nagarpalika-v2/Server/out/web>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    Alias /admin /home/dev-team-np/project/nagarpalika-v2/Server/out/admin
    <Directory /home/dev-team-np/project/nagarpalika-v2/Server/out/admin>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        RewriteEngine On
        RewriteBase /admin/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/patan.onlinejobportal.org-0001/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/patan.onlinejobportal.org-0001/privkey.pem
</VirtualHost>
</IfModule>
